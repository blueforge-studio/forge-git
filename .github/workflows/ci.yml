name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck --if-present

      - name: Lint
        run: pnpm -r lint --if-present

      - name: Test
        run: pnpm --filter @forge-git/web test

      - name: Build gitea-bridge
        run: pnpm -C packages/gitea-bridge build

      - name: Build cli
        run: pnpm -C packages/cli build

      - name: Build ui
        run: pnpm -C packages/ui build

      - name: Build deploy-runner
        run: pnpm -C packages/deploy-runner build

      - name: Build web
        run: pnpm -C apps/web build
