name: CI

on:
  push:
    branches: [main]
  pull_request_target:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [gitea-bridge, deploy-runner, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test ${{ matrix.package }}
        run: pnpm --filter @forge-git/${{ matrix.package }} test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          pnpm -C packages/gitea-bridge build
          pnpm -C packages/deploy-runner build
          pnpm -C packages/cli build
          pnpm -C packages/ui build
          pnpm -C apps/web build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build web app
        run: pnpm -C apps/web build

      - name: Run E2E tests
        run: pnpm exec playwright test --project=chromium
        working-directory: apps/web
        env:
          CI: true

  docker:
    runs-on: ubuntu-latest
    needs: e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        image:
          - name: deploy-runner
            dockerfile: packages/deploy-runner/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GITEA_REGISTRY || 'forge-git.blueforge.studio' }}
          username: ${{ secrets.GITEA_REGISTRY_USER || 'forge-admin' }}
          password: ${{ secrets.GITEA_REGISTRY_TOKEN }}

      - name: Build and push deploy-runner
        if: matrix.image.name == 'deploy-runner'
        run: |
          docker build \
            -f ${{ matrix.image.dockerfile }} \
            -t ${{ vars.GITEA_REGISTRY || 'forge-git.blueforge.studio' }}/forge-admin/forge-git-deploy-runner:${{ github.sha }} \
            -t ${{ vars.GITEA_REGISTRY || 'forge-git.blueforge.studio' }}/forge-admin/forge-git-deploy-runner:latest \
            .
          docker push ${{ vars.GITEA_REGISTRY || 'forge-git.blueforge.studio' }}/forge-admin/forge-git-deploy-runner:${{ github.sha }}
          docker push ${{ vars.GITEA_REGISTRY || 'forge-git.blueforge.studio' }}/forge-admin/forge-git-deploy-runner:latest

      - name: Build and push web
        if: matrix.image.name == 'web'
        run: |
          docker build \
            -f ${{ matrix.image.dockerfile }} \
            -t ${{ vars.GITEA_REGISTRY || 'forge-git.blueforge.studio' }}/forge-admin/forge-git-web:${{ github.sha }} \
            -t ${{ vars.GITEA_REGISTRY || 'forge-git.blueforge.studio' }}/forge-admin/forge-git-web:latest \
            .
          docker push ${{ vars.GITEA_REGISTRY || 'forge-git.blueforge.studio' }}/forge-admin/forge-git-web:${{ github.sha }}
          docker push ${{ vars.GITEA_REGISTRY || 'forge-git.blueforge.studio' }}/forge-admin/forge-git-web:latest
